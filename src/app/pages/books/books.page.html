<div class="page">
    <div class="card card-pad">
        <h1 style="margin: 0 0 6px; font-size: 24px">Bücher</h1>
    </div>

    <app-section title="Reading & Learnings Highlights">
        <div class="list">
            @for (b of books; track $index) {
                <div class="card card-pad item">
                    <h3>{{ b.title }}</h3>

                    <div class="divider" aria-hidden="true"></div>
                    <!-- Trennungslinie -->

                    <div class="kpis" style="margin-top: 8px">
                        <span class="pill">{{ b.author }}</span>
                    </div>

                    <div class="small" style="margin-top: 10px">Key Takeaways</div>
                    <ul
                        style="
                            margin: 8px 0 0;
                            padding-left: 18px;
                            color: var(--muted);
                            line-height: 1.6;
                        "
                    >
                        @for (t of b.takeaways; track $index) {
                            <li>{{ t }}</li>
                        }
                    </ul>

                    @if (b.appliedIn) {
                        <div class="small" style="margin-top: 10px">
                            <strong>Angewandt: </strong>
                            <span style="color: var(--muted)">{{ b.appliedIn }}</span>
                        </div>
                    }
                </div>
            }
        </div>
    </app-section>
</div>
