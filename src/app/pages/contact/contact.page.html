<div class="page">
    <div class="card card-pad contact-intro">
        <h1>Kontakt</h1>
        <p class="small intro-text">
            Bitte schreib mir kurz per E-Mail – ich freue mich auf deine Anfrage.
        </p>
    </div>

    <app-section title="">
        <div class="grid cols-3">
            <div class="card card-pad item">
                <div class="item-head">
                    <span class="item-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linejoin="round"
                            />
                            <path
                                d="m22 6-10 7L2 6"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </span>
                    <h3>E-Mail</h3>
                </div>
                <p>{{ profile.email }}</p>
                <div class="actions">
                    <a class="btn primary" [href]="'mailto:' + profile.email">Mail schreiben</a>
                    <button type="button" class="btn" (click)="copy(profile.email, 'E-Mail')">
                        Kopieren
                    </button>
                </div>
            </div>

            <div class="card card-pad item">
                <div class="item-head">
                    <span class="item-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.43 7.86 10.96.57.1.79-.24.79-.54 0-.27-.01-1.13-.01-2.05-3.2.7-3.87-1.54-3.87-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.72 1.26 3.38.96.1-.75.4-1.26.73-1.55-2.56-.29-5.26-1.28-5.26-5.71 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.8 0c2.21-1.49 3.17-1.18 3.17-1.18.64 1.59.24 2.77.12 3.06.74.81 1.19 1.84 1.19 3.1 0 3.45-2.7 4.42-5.27 4.71.42.36.79 1.08.79 2.18 0 1.57-.01 2.84-.01 3.23 0 .31.21.65.8.54A10.52 10.52 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"
                            />
                        </svg>
                    </span>
                    <h3>GitHub</h3>
                </div>
                <p class="small">{{ profile.links.github }}</p>
                <div class="actions">
                    <a
                        class="btn primary"
                        [href]="profile.links.github"
                        target="_blank"
                        rel="noopener noreferrer"
                        >Öffnen</a
                    >
                    <button type="button" class="btn" (click)="copy(profile.links.github, 'GitHub')">
                        Kopieren
                    </button>
                </div>
            </div>

            <div class="card card-pad item">
                <div class="item-head">
                    <span class="item-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 0 1-2.08-2.06 2.07 2.07 0 1 1 4.14 0 2.06 2.06 0 0 1-2.06 2.06zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77A1.75 1.75 0 0 0 0 1.73v20.54A1.75 1.75 0 0 0 1.77 24h20.45A1.76 1.76 0 0 0 24 22.27V1.73A1.76 1.76 0 0 0 22.22 0z"
                            />
                        </svg>
                    </span>
                    <h3>LinkedIn</h3>
                </div>
                <p class="small">{{ profile.links.linkedin }}</p>
                <div class="actions">
                    <a
                        class="btn primary"
                        [href]="profile.links.linkedin"
                        target="_blank"
                        rel="noopener noreferrer"
                        >Öffnen</a
                    >
                    <button type="button" class="btn" (click)="copy(profile.links.linkedin, 'LinkedIn')">
                        Kopieren
                    </button>
                </div>
            </div>
        </div>

        @if (copied) {
            <div class="copy-hint card card-pad" role="status" aria-live="polite">Kopiert: {{ copied }}</div>
        }
    </app-section>
</div>
