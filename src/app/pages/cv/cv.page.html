<div class="page">
    <div class="card card-pad">
        <div class="hero-grid">
            <!-- LINKS: Text -->
            <div class="hero-copy">
                <h1 style="margin:0 0 6px; font-size:24px;">Lebenslauf</h1>

                <div class="kpis" style="margin-top: 10px;">
                    <span class="pill">{{ "Softwareentwickler" }}</span>
                </div>

                <p class="small" style="margin:12px 0 0;">
                    Summary: Kurzprofil: 3-5 Zeilen uber deinen Fokus und was du lieferst.
                </p>

                <div class="actions" style="margin-top: 12px;">
                    <a class="btn primary" [href]="cvUrl" download>CV herunterladen (PDF)</a>
                    <a class="btn" routerLink="/contact">Kontakt</a>
                </div>
            </div>

            <!-- RECHTS: Foto (wie auf Home) -->
            <div class="hero-media">
                <div class="avatar-frame">
                    <img class="avatar" [src]="profile.photoUrl" alt="Portrait von {{ profile.name }}" />
                </div>
            </div>
        </div>
    </div>

  <app-section title="Berufserfahrung">
    <div class="list">
      <div class="card card-pad" *ngFor="let e of cv.experience">
        <h3 style="margin:0 0 4px;">{{ e.title }}</h3>
        <div class="small">{{ e.company }} · {{ e.period }}</div>
        <ul style="margin:10px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.6;">
          <li *ngFor="let b of e.bullets">{{ b }}</li>
        </ul>
      </div>
    </div>
  </app-section>

  <app-section title="Akademische Laufbahn">
    <div class="list">
      <div class="card card-pad" *ngFor="let e of cv.education">
        <h3 style="margin:0 0 4px;">{{ e.title }}</h3>
        <div class="small">{{ e.school }} · {{ e.period }}</div>
        <ul style="margin:10px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.6;">
          <li *ngFor="let b of e.bullets">{{ b }}</li>
        </ul>
      </div>
    </div>
  </app-section>
</div>
