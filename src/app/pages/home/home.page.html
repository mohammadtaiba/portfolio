<div class="page">
    <div class="hero card card-pad">
        <div class="hero-grid">
            <!-- LINKS: Text -->
            <div class="hero-copy">
                <div class="hero-badges">
                    <span class="status-badge">
                        <span class="status-dot" aria-hidden="true"></span>
                        Verfügbar
                    </span>
                </div>

                <h1>{{ profile.role }}</h1>

                <p class="hero-pitch">{{ profile.pitchDetail }}</p>

                <div class="actions">
                    <a class="btn" routerLink="/projects">Projekte ansehen</a>
                    <a class="btn" routerLink="/contact">Mich kontaktieren</a>
                    <!-- <a class="btn" href="assets/cv.pdf" target="_blank" rel="noopener noreferrer">CV öffnen</a> -->
                </div>
            </div>

            <!-- RECHTS: Foto -->
            <div class="hero-media">
                <div class="avatar-frame">
                    <img
                        class="avatar"
                        [src]="profile.photoUrl"
                        alt="Portrait von {{ profile.name }}"
                    />
                </div>
            </div>
        </div>
    </div>

    <section class="focus-section">
        <h2 class="focus-heading">Was ich entwickle</h2>
        <div class="focus-grid">
            @for (f of profile.focus; track $index) {
                <div class="focus-card">
                    <span class="focus-title-pill">{{ focusIcons[$index] }} {{ f.title }}</span>
                    <p class="focus-desc">{{ f.subtitle }}</p>
                </div>
            }
        </div>

        <div class="focus-cta-wrap">
            <a
                class="btn primary focus-cta"
                routerLink="/projects"
                aria-label="Alle Projekte ansehen — zur Projektübersicht"
            >
                <span class="focus-cta-text">Alle Projekte ansehen</span>
                <span class="focus-cta-icon" aria-hidden="true">→</span>
            </a>
        </div>
    </section>
</div>
