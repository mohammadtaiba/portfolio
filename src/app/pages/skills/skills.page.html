<div class="page">
  <div class="card card-pad">
    <h1 style="margin:0 0 6px; font-size:24px;">Skills</h1>
    <p class="small" style="margin:0;">Erfolg besteht darin, dass man genau die Fähigkeiten hat, die im Moment gefragt sind.</p>
  </div>

  <app-section title="Skill-Übersicht" subtitle="">
    <div class="grid cols-2">
      <div class="card card-pad" *ngFor="let g of groups">
        <h3 style="margin:0 0 10px;">{{ g.group }}</h3>
        <div class="tags">
          <span class="pill" *ngFor="let s of g.items">{{ s }}</span>
        </div>
      </div>
    </div>
  </app-section>
</div>
