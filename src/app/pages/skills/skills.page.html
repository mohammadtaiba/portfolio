<div class="page">
    <div class="card card-pad">
        <h1 style="margin: 0 0 6px; font-size: 24px">Skills</h1>
    </div>

    <app-section title="" subtitle="">
        <div class="grid cols-2">
            @for (g of groups; track $index) {
                <div class="card card-pad">
                    <h3 style="margin: 0 0 10px">{{ g.group }}</h3>
                    <div class="tags">
                        @for (s of g.items; track $index) {
                            <span class="pill">{{ s }}</span>
                        }
                    </div>
                </div>
            }
        </div>
    </app-section>
</div>
